name: Deploy docs to GitHub Pages

# DISABLED: the active GitHub Pages workflow is jekyll-gh-pages.yml, which
# builds doc/ with the github-pages gem and renders correctly. This Bundler/
# Jekyll-4 build is kept for reference (and local parity via doc/Gemfile) but
# no longer runs automatically -- the push trigger has been removed so it does
# not race jekyll-gh-pages.yml on the shared "pages" environment. It can still
# be started manually from the Actions tab.
on:
  workflow_dispatch:

# Permissions needed by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby and install gems (doc/Gemfile)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: doc

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Switch the repository's Pages source to "GitHub Actions" on the
          # first run, so publishing no longer uses the gh-pages branch.
          enablement: true

      - name: Build Jekyll site from doc/
        working-directory: doc
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination "${{ github.workspace }}/_site"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
