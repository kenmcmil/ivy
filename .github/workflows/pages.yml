name: Deploy docs to GitHub Pages

# Build the Jekyll site in doc/ on the master branch and publish it to
# GitHub Pages via GitHub Actions (instead of the gh-pages branch).

on:
  push:
    branches: [master]
    paths:
      - 'doc/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Permissions needed by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Switch the repository's Pages source to "GitHub Actions" on the
          # first run, so publishing no longer uses the gh-pages branch.
          enablement: true

      - name: Build Jekyll site from doc/
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./doc
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
