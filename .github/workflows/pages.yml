name: Deploy docs to GitHub Pages

# Build the Jekyll site in doc/ on the master branch and publish it to
# GitHub Pages via GitHub Actions (instead of the gh-pages branch). The build
# uses doc/Gemfile with Bundler, so it matches a local `bundle exec jekyll`.

on:
  push:
    branches: [master]
    paths:
      - 'doc/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Permissions needed by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby and install gems (doc/Gemfile)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: doc

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Switch the repository's Pages source to "GitHub Actions" on the
          # first run, so publishing no longer uses the gh-pages branch.
          enablement: true

      - name: Build Jekyll site from doc/
        working-directory: doc
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination "${{ github.workspace }}/_site"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
