# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

# This is the active GitHub Pages workflow: it builds doc/ with the
# github-pages gem (the same environment GitHub Pages uses), which renders the
# site correctly, and additionally builds the Hugo blog (blog/) into _site/blog.
# pages.yml (a Bundler/Jekyll-4 build) is disabled to avoid racing this one on
# the shared "pages" environment.
on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Jekyll renders doc/ into _site (the site root); Hugo then renders
  # the blog/ site into _site/blog. The combined _site is uploaded as the Pages
  # artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch Hugo theme
        # Only the PaperMod theme submodule -- not the heavy abc/z3/picotls ones.
        run: git submodule update --init --depth 1 blog/themes/PaperMod
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build docs with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./doc/
          destination: ./_site
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.164.0'   # pinned to a tested version (extended)
          extended: true
      - name: Build blog with Hugo (into _site/blog)
        run: >-
          hugo --source blog --minify
          --baseURL "https://kenmcmil.github.io/ivy/blog/"
          --destination "$GITHUB_WORKSPACE/_site/blog"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
