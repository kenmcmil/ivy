name: Linux Continuous Integration

on:
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: ['ubuntu-24.04']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: x64

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          max-size: 100M

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential cmake git pkg-config libssl-dev libreadline-dev

      - run: pip3 install wheel
      - run: python3 build_submodules.py
      - run: python3 setup.py bdist_wheel --plat-name manylinux1_x86_64
      - run: ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: ivy-wheels
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/download-artifact@v4
        with:
          name: ivy-wheels
          path: dist/
      - run: ls -l dist
      - name: Publish package
#        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          skip_existing: true
          verbose: true
